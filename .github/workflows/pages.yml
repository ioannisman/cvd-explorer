# Coverage timeline is stored in Actions cache (not git), so this works when main is PR-only.
name: Pages site

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: pages-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      # Persist coverage-history.json without pushing to main (branch protection friendly).
      - name: Restore coverage history cache
        uses: actions/cache@v4
        with:
          path: pages/coverage-history.json
          key: coverage-history-${{ github.run_id }}
          restore-keys: |
            coverage-history-

      - name: Set up Liberica JDK 25 (with JavaFX)
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: "25"
          java-package: jdk+fx

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Xvfb (JavaFX tests need a display on Linux)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Tests and JaCoCo
        run: chmod +x gradlew && xvfb-run -a ./gradlew test jacocoRootReport jacocoTestCoverageVerification -Pcoverage --no-daemon

      - name: Build TeaVM + web explorer
        run: |
          ./gradlew :web-bridge:generateJavaScript --no-daemon
          cd web
          npm ci
          npm run build

      - name: Assemble site (coverage + explorer + other + history)
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          TS="${{ github.event.head_commit.timestamp }}"
          if [ -z "$TS" ]; then TS=$(date -u +%Y-%m-%dT%H:%M:%SZ); fi
          python3 scripts/assemble_pages_site.py \
            --jacoco-xml build/reports/jacoco/jacocoRootReport/jacocoRootReport.xml \
            --jacoco-html-dir build/reports/jacoco/jacocoRootReport/html \
            --pages-src pages \
            --out-site build/pages-site \
            --explorer-dir web/dist \
            --sha "$GITHUB_SHA" \
            --date "$TS"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
