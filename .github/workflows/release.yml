# When you publish a GitHub Release, build a fat JAR and attach it to that release.

name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Liberica JDK 25 (with JavaFX)
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: "25"
          java-package: jdk+fx

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install Xvfb (JavaFX tests need a display on Linux)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run tests and build fat JAR
        run: chmod +x gradlew && xvfb-run -a ./gradlew check shadowJar --no-daemon

      - name: Upload JAR to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/cvd-explorer-all.jar
