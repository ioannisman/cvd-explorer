<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TeaVM classify spike</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1.5rem; }
    pre { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>TeaVM classify spike</h1>
  <p>Loads <code>cvd-core.js</code>, runs <code>main()</code>, then <code>loadSceneJson</code> with a tiny scene.</p>
  <pre id="spike-result">Running…</pre>
  <script type="module">
    import { main } from './cvd-core.js';

    const tinyScene = JSON.stringify({
      version: '1',
      name: 'Spike scene',
      metricKind: 'MINIMUM_DISTANCE',
      neighborOrder: 'NEAREST',
      siteMemberKind: 'POINT',
      nearestNeighborK: 1,
      clusters: [
        {
          name: 'A',
          color: { r: 1, g: 0.5, b: 0.2, opacity: 1 },
          members: [{ kind: 'POINT', x: -40, y: 0 }],
        },
        {
          name: 'B',
          color: { r: 0.2, g: 0.5, b: 1, opacity: 1 },
          members: [{ kind: 'POINT', x: 40, y: 10 }],
        },
      ],
    });

    const result = document.getElementById('spike-result');
    try {
      main();
      const core = globalThis.cvdCore;
      if (!core?.loadSceneJson || !core?.renderFrame) {
        throw new Error('cvdCore.loadSceneJson / renderFrame missing');
      }
      const err = core.loadSceneJson(tinyScene);
      if (err) {
        throw new Error(err);
      }
      const frame = core.renderFrame(48, 48);
      const n = frame?.scene?.clusterCount ?? 0;
      if (n !== 2) {
        throw new Error('expected 2 clusters, got ' + n);
      }
      result.textContent = 'OK: loadSceneJson + renderFrame (2 clusters)\n';
      result.dataset.ok = 'true';
    } catch (e) {
      result.textContent = 'FAIL: ' + (e && e.message ? e.message : String(e));
      result.dataset.ok = 'false';
      throw e;
    }
  </script>
</body>
</html>
