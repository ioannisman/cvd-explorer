plugins {
    id 'java-library'
}

dependencies {
    implementation 'com.google.code.gson:gson:2.11.0'
}

processResources {
    from("${rootProject.projectDir}/scenes/gallery") {
        into 'scenes/gallery'
    }
}

tasks.named('jacocoTestReport', JacocoReport) {
    dependsOn tasks.named('test')
    onlyIf { rootProject.hasProperty('coverage') }
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

tasks.named('jacocoTestCoverageVerification') {
    dependsOn tasks.named('test')
    onlyIf { rootProject.hasProperty('coverage') }
    violationRules {
        rule {
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.40g
            }
        }
    }
}

tasks.named('check') {
    if (rootProject.hasProperty('coverage')) {
        dependsOn tasks.named('jacocoTestCoverageVerification')
    }
}
